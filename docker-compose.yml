version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: cp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-controlplane}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - cp_mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  cp_mysql_data:
