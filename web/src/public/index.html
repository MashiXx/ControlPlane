<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ControlPlane</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="/bootstrap.js"></script>
</head>
<body>
  <header>
    <h1>ControlPlane</h1>
    <div id="conn" class="dot" title="WebSocket status"></div>
  </header>

  <nav class="tabs">
    <button data-tab="apps"   class="active">Applications</button>
    <button data-tab="jobs">Jobs</button>
    <button data-tab="audit">Audit</button>
    <button data-tab="logs">Live logs</button>
  </nav>

  <main>
    <section id="tab-apps" class="tab active">
      <div class="toolbar">
        <select id="groupFilter"><option value="">All groups</option></select>
        <button id="btn-restart-group" class="danger">Restart group</button>
        <button id="btn-build-group">Build group</button>
        <button id="btn-refresh">Refresh</button>
      </div>
      <table id="apps-table">
        <thead><tr>
          <th>Name</th><th>Group</th><th>Server</th><th>Runtime</th>
          <th>State</th><th>PID</th><th>Uptime</th><th>Actions</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="tab-jobs" class="tab">
      <table id="jobs-table">
        <thead><tr>
          <th>ID</th><th>Action</th><th>Target</th><th>Status</th>
          <th>Attempts</th><th>Enqueued</th><th>Finished</th><th>Error</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="tab-audit" class="tab">
      <table id="audit-table">
        <thead><tr>
          <th>Time</th><th>Actor</th><th>Action</th><th>Target</th><th>Result</th><th>Message</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="tab-logs" class="tab">
      <pre id="live-logs"></pre>
    </section>
  </main>

  <script src="/app.js" type="module"></script>
</body>
</html>
